apiVersion: apps/v1
kind: Deployment
metadata:
    name: s3-app
spec:
    replicas: 1
    selector:
        matchLabels:
            app: s3-app
    template:
        metadata:
            labels:
                app: s3-app
        spec:
            serviceAccountName: s3-access-sa
            containers:
            - name: aws-cli
              image: amazon/aws-cli
              command: ["sleep", "infinity"]