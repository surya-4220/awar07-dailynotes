apiVersion: v1
kind: Namespace
metadata:
    name: uat-namespace
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: nginx-deployment
    namespace: uat-namespace
spec:
    replicas: 2
    selector:
        matchLabels:
            app: nginx
    template:
        metadata:
            labels:
                app: nginx
        spec:
            containers:
            - name: nginx
              image: nginx:1.28
              ports:
              - containerPort: 80