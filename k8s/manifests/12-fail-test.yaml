apiVersion: v1
kind: Pod
metadata:
    name: fail-test
    namespace: dev-namespace
spec:
    containers:
    - name: myfirstpod
      image: nginx
      ports:
      - containerPort: 80
      resources:
          limits:
              memory: "2Gi"
              cpu: "3"
          requests:
              memory: "2Gi"
              cpu: "2"